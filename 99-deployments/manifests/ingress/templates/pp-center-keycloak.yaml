---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.ppCenterKeycloak.service.name }}
spec:
  ports:
    - port: {{ .Values.ppCenterKeycloak.service.port }}
      targetPort: {{ .Values.ppCenterKeycloak.service.port }}
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: {{ .Values.ppCenterKeycloak.service.name }}
subsets:
  - addresses:
      - ip: {{ .Values.ppCenterKeycloak.endpoints.ip }}
    ports:
      - port: {{ .Values.ppCenterKeycloak.service.port }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ppCenterKeycloak.ingress.name }}
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/upstream-vhost: "{{ .Values.ppCenterKeycloak.ingress.vhost }}"
    nginx.ingress.kubernetes.io/proxy-ssl-server-name: "on"
    nginx.ingress.kubernetes.io/proxy-ssl-name: "{{ .Values.ppCenterKeycloak.ingress.vhost }}"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/preserve-host: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-Host {{ .Values.ppCenterKeycloak.ingress.host }};
      proxy_set_header X-Forwarded-Port 443;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
      - {{ .Values.ppCenterKeycloak.ingress.host }}
  rules:
    - host: {{ .Values.ppCenterKeycloak.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ppCenterKeycloak.service.name }}
                port:
                  number: {{ .Values.ppCenterKeycloak.service.port }}
