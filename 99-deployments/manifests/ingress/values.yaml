ppSensorApiDev:
  service:
    name: sensor-api-upstream-dev
    port: 443
  endpoints:
    ip: 192.168.1.11
  ingress:
    name: sensor-api-proxy-dev
    vhost: api-dev.sensor.local
    host: api-dev.sensor-01.please-protect.com

ppSensorWebDev:
  service:
    name: sensor-web-upstream-dev
    port: 443
  endpoints:
    ip: 192.168.1.11
  ingress:
    name: sensor-web-proxy-dev
    vhost: web-dev.sensor.local
    host: web-dev.sensor-01.please-protect.com

ppSensorApiProd: {} # No API in production yet, but we want to keep the structure consistent for when we do have one.

ppSensorWebProd:
  service:
    name: sensor-web-upstream-prod
    port: 443
  endpoints:
    ip: 192.168.1.11
  ingress:
    name: sensor-web-proxy-prod
    vhost: web.sensor.local
    host: web.sensor-01.please-protect.com
